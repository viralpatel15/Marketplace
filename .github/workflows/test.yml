name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: strongpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://admin:strongpass@localhost:5432/marketplace_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-at-least-32-characters-long
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short
